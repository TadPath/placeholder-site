<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | We'll be back soon</title>
    <style>
        :root {
            --bg: #0d1117;
            --text: #c9d1d9;
            --accent: #58a6ff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            color: white;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: 1px solid var(--accent);
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            color: var(--accent);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">System Migration in Progress</div>
        <h1>We’ll be back soon</h1>
        <p>The Optarc.co.uk, TadPath, Deconvolve.net, Pathbook.com and Bialith.com sites are moving to a new home. We are currently updating our infrastructure to provide a better experience.</p>
        
        <div class="links">
            <a href="https://github.com/TadPath/PUMA">View the PUMA Microscope Project on GitHub</a>
        </div>
    </div>
</body>
</html>
